name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95
          components: rustfmt, clippy
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry + build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            vendor/topcoat -> target
          cache-on-failure: true
          cache-key: ${{ runner.os }}-ci-${{ hashFiles('Cargo.lock', 'vendor/topcoat/Cargo.lock') }}

      - name: cargo fmt --check
        run: cargo fmt --all -- --check

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-targets

  smoke:
    name: Docker build smoke
    runs-on: ubuntu-latest
    needs: check
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache cargo registry for build context
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target
            vendor/topcoat -> target
          cache-key: ${{ runner.os }}-buildx-${{ hashFiles('Cargo.lock', 'vendor/topcoat/Cargo.lock') }}
          cache-targets: |
            target x86_64-unknown-linux-gnu
            vendor/topcoat/target x86_64-unknown-linux-gnu

      - name: Build (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          tags: metro-dash:ci-${{ github.sha }}
          load: true
          cache-from: type=gha,scope=docker-build
          cache-to: type=gha,scope=docker-build,mode=max

      - name: Inspect image
        run: |
          docker run --rm metro-dash:ci-${{ github.sha }} --version 2>&1 || true
          echo "image size:"
          docker image inspect metro-dash:ci-${{ github.sha }} --format '{{.Size}}' | numfmt --to=iec
