# fly.toml app configuration file generated for metrodash on 2026-07-23T13:19:45Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'metrodash'
primary_region = 'sin'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'
  release_command = 'true'

[env]
  HOST = '0.0.0.0'
  METRO_CACHE_PATH = '/app/.cache/namma-metro-ridership.csv'
  METRO_REFRESH_SECONDS = '21600'
  PORT = '3000'

[[mounts]]
  source = 'metro_cache'
  destination = '/app/.cache'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '30s'
    method = 'GET'
    path = '/'

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
