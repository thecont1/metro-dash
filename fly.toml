app = "namma-metro-in-charts"
primary_region = "sin"

# Start with two regions so a Singapore outage or slow path from India can
# still land on Tokyo or Mumbai while it exists. Mumbai is scheduled to shut
# down, so leave a comment to revisit before the deprecation date lands.
#
# Fly will not boot a machine in a region without capacity; if Mumbai stops
# accepting apps, just delete the `bom` line below and `fly deploy` again.
#
# primary_region = "sin"
# [[vm]]
#   size = "shared-cpu-1x"
#   memory = "512mb"
#   regions = ["sin", "nrt"]

[build]
  dockerfile = "Dockerfile"

[env]
  HOST = "0.0.0.0"
  PORT = "3000"
  METRO_CACHE_PATH = "/app/.cache/namma-metro-ridership.csv"
  METRO_REFRESH_SECONDS = "21600"

[[mounts]]
  source = "metro_cache"
  destination = "/app/.cache"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep at least one machine warm so the published URL stays fast for a
  # random visitor — the app's whole point is being instantly available.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[deploy]
  # The release binary is ~70 MB and the build context is small. Give the
  # builder enough headroom for the rust+topcoat dependency graph without
  # bumping the cost on every CI run.
  release_command = "true"
  strategy = "rolling"
