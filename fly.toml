app = "metrodash"
primary_region = "sin"
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  dockerfile = "Dockerfile"

[deploy]
  # The release binary is ~70 MB and the build context is small. Give the
  # builder enough headroom for the rust+topcoat dependency graph without
  # bumping the cost on every CI run.
  release_command = "true"
  strategy = "rolling"

[env]
  HOST = "0.0.0.0"
  PORT = "3000"
  METRO_CACHE_PATH = "/app/.cache/namma-metro-ridership.csv"
  METRO_REFRESH_SECONDS = "21600"

[[mounts]]
  source = "metro_cache"
  destination = "/app/.cache"

[http_service]
  internal_port = 3000
  force_https = true
  # Keep at least one machine warm so the published URL stays fast for a
  # random visitor — the app's whole point is being instantly available.
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
  grace_period = "30s"
  interval = "30s"
  method = "GET"
  path = "/"
  timeout = "5s"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

# Region selection: sin is primary because Fly is shutting down bom
# (Mumbai). If sin becomes congested or unavailable, add `regions = ["nrt"]`
# to the [[vm]] block above.
